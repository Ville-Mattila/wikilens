name: Deploy landing page to GitHub Pages

on:
  push:
    branches: [main]
    paths: ["docs/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      # GitHub's Pages backend intermittently rejects deployments with a
      # generic "try again later"; an immediate retry hits the same failure,
      # so wait for the backend to settle before the second attempt
      - if: steps.deployment.outcome == 'failure'
        run: sleep 30
      - id: retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
